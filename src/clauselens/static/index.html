<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ClauseLens — contract analysis</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --panel2: #1e222b; --line: #2a2f3a;
    --ink: #e6e9ef; --muted: #9aa3b2; --accent: #6ea8fe; --risk: #f0883e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  header {
    padding: 14px 20px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 16px;
  }
  header h1 { font-size: 17px; margin: 0; font-weight: 650; letter-spacing: .2px; }
  header .tag { color: var(--muted); font-size: 13px; }
  select {
    margin-left: auto; background: var(--panel2); color: var(--ink);
    border: 1px solid var(--line); border-radius: 8px; padding: 7px 10px;
    max-width: 46ch; font-size: 13px;
  }
  main { display: grid; grid-template-columns: 1fr 360px; gap: 0; height: calc(100vh - 57px); }
  #doc {
    padding: 22px 26px; overflow: auto; white-space: pre-wrap;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12.5px; line-height: 1.7; color: #cdd3de;
  }
  aside {
    border-left: 1px solid var(--line); background: var(--panel);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .section { padding: 14px 16px; border-bottom: 1px solid var(--line); }
  .section h2 {
    font-size: 12px; text-transform: uppercase; letter-spacing: .8px;
    color: var(--muted); margin: 0 0 10px;
  }
  .clause {
    border-radius: 3px; padding: 0 1px;
    background: rgba(110,168,254,.22); border-bottom: 2px solid rgba(110,168,254,.7);
    cursor: pointer;
  }
  .clause.risk {
    background: rgba(240,136,62,.20); border-bottom-color: rgba(240,136,62,.8);
  }
  .clause.flash { animation: flash .9s ease; }
  @keyframes flash { 0% { background: var(--accent); } 100% {} }
  .cl-list { display: flex; flex-direction: column; gap: 6px; overflow: auto; }
  .cl-item {
    background: var(--panel2); border: 1px solid var(--line); border-left: 3px solid var(--accent);
    border-radius: 7px; padding: 8px 10px; cursor: pointer;
  }
  .cl-item.risk { border-left-color: var(--risk); }
  .cl-item:hover { border-color: var(--accent); }
  .cl-name { font-size: 12px; font-weight: 600; }
  .cl-name .risk-dot { color: var(--risk); font-size: 11px; margin-left: 6px; }
  .cl-text { font-size: 11.5px; color: var(--muted); margin-top: 3px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  #qa { margin-top: auto; }
  #qa .row { display: flex; gap: 8px; }
  #q {
    flex: 1; background: var(--panel2); color: var(--ink); border: 1px solid var(--line);
    border-radius: 8px; padding: 9px 11px; font-size: 13px;
  }
  #ask { background: var(--accent); color: #08111f; border: 0; border-radius: 8px;
    padding: 0 14px; font-weight: 650; cursor: pointer; }
  #ask:disabled { opacity: .5; cursor: default; }
  #answer { margin-top: 10px; font-size: 13px; }
  .cite { display: block; margin-top: 7px; padding: 7px 9px; background: var(--panel2);
    border-left: 3px solid var(--accent); border-radius: 6px; font-size: 11.5px;
    color: var(--muted); cursor: pointer; }
  .warn { color: var(--risk); font-size: 12px; }
  .empty { color: var(--muted); padding: 40px; text-align: center; }
</style>
</head>
<body>
<header>
  <h1>ClauseLens</h1>
  <span class="tag">contract clause extraction &amp; cited Q&amp;A</span>
  <select id="picker"><option>Loading contracts…</option></select>
</header>
<main>
  <div id="doc"><div class="empty">Pick a contract to see its clauses highlighted.</div></div>
  <aside>
    <div class="section" style="flex:1; display:flex; flex-direction:column; min-height:0;">
      <h2>Clauses <span id="count" style="color:var(--muted)"></span></h2>
      <div class="cl-list" id="clauses"></div>
    </div>
    <div class="section" id="qa">
      <h2>Ask the contract</h2>
      <div class="row">
        <input id="q" placeholder="e.g. Which law governs this contract?" />
        <button id="ask">Ask</button>
      </div>
      <div id="answer"></div>
    </div>
  </aside>
</main>
<script>
const $ = s => document.querySelector(s);
let currentIdx = null;

async function loadContracts() {
  const r = await fetch('/api/contracts');
  const list = await r.json();
  const p = $('#picker');
  p.innerHTML = '<option value="">— select a contract —</option>' +
    list.map(c => `<option value="${c.idx}">${c.title.slice(0,70)} (${(c.chars/1000|0)}k)</option>`).join('');
  p.onchange = () => p.value && showContract(+p.value);
}

const COLORS = {}; // clause -> bool risk handled via CSS class

async function showContract(idx) {
  currentIdx = idx;
  $('#doc').innerHTML = '<div class="empty">Loading…</div>';
  $('#answer').innerHTML = '';
  const r = await fetch('/api/demo/' + idx);
  if (!r.ok) { $('#doc').innerHTML = '<div class="empty">No cached extraction.</div>'; return; }
  const data = await r.json();
  $('#doc').innerHTML = data.highlighted_html;
  // risk styling on marks
  document.querySelectorAll('#doc mark').forEach(m => {
    const cl = data.clauses.find(c => c.start == m.dataset.start);
    if (cl && cl.risk) m.classList.add('risk');
  });
  renderClauseList(data.clauses);
}

function renderClauseList(clauses) {
  $('#count').textContent = `(${clauses.length})`;
  $('#clauses').innerHTML = clauses.map(c => `
    <div class="cl-item ${c.risk?'risk':''}" data-start="${c.start}">
      <div class="cl-name">${c.label}${c.risk?'<span class="risk-dot">● risk</span>':''}</div>
      <div class="cl-text">${escapeHtml(c.text)}</div>
    </div>`).join('');
  document.querySelectorAll('.cl-item').forEach(el =>
    el.onclick = () => scrollToSpan(el.dataset.start));
}

function scrollToSpan(start) {
  const m = document.getElementById('span-' + start);
  if (!m) return;
  m.scrollIntoView({ behavior: 'smooth', block: 'center' });
  m.classList.remove('flash'); void m.offsetWidth; m.classList.add('flash');
}

async function ask() {
  if (currentIdx === null) return;
  const q = $('#q').value.trim(); if (!q) return;
  $('#ask').disabled = true; $('#answer').innerHTML = 'Thinking…';
  try {
    const r = await fetch('/api/ask', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ idx: currentIdx, question: q })
    });
    if (!r.ok) { $('#answer').innerHTML = '<span class="warn">LLM endpoint unavailable (free quota may be spent).</span>'; return; }
    const a = await r.json();
    let html = `<div>${escapeHtml(a.answer)}</div>`;
    if (a.unsupported) html += '<div class="warn">⚠ no grounded citation</div>';
    html += a.citations.map(c =>
      `<span class="cite" data-start="${c.start}">“${escapeHtml(c.text.slice(0,200))}”</span>`).join('');
    $('#answer').innerHTML = html;
    document.querySelectorAll('.cite').forEach(el =>
      el.onclick = () => scrollToSpan(el.dataset.start));
  } finally { $('#ask').disabled = false; }
}

function escapeHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
$('#ask').onclick = ask;
$('#q').addEventListener('keydown', e => { if (e.key === 'Enter') ask(); });
loadContracts();
</script>
</body>
</html>
